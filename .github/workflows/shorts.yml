name: 🎬 관심종목 쇼츠 생성 (45~60초)

on:
  # stock-briefing-v3-1(morning_core 데이터) 완료 이후 수동으로 실행한다.
  # step1/step2와 동일한 이유로 자동 dispatch를 걸지 않는다 — 과금(OpenAI/TTS)
  # 방지를 위해 사람이 데이터 준비를 확인한 뒤 수동 실행. 운영이 안정되면
  # stock-briefing-v3-1의 cron 뒤에 workflow_dispatch 체인을 걸어 자동화할 수
  # 있다(v3-1 → v3-2 자동 dispatch와 동일 패턴, README 참고).
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          드라이런 모드 — OpenAI/TTS/미디어 검색을 실제로 호출하지 않고
          (SCRIPT_MOCK/TTS_MOCK/MEDIA_MOCK) 파이프라인 전체를 무료로 검증만 한다.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  script:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install openai requests python-dotenv pyyaml
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRIPT_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_script.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: script
          path: output/KO/scripts/

  voice:
    needs: script
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install openai requests Pillow>=10.0.0 pyyaml
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          TTS_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_voice.py KO
      - name: TTS 결과 검증
        run: |
          total=$(ls output/KO/audio/*.mp3 2>/dev/null | wc -l)
          echo "총 MP3 파일 수: $total"
          if [ "$total" -lt 5 ]; then
            echo "❌ MP3 파일이 너무 적습니다 ($total개 < 5개: hook/top3/top2/top1/closing)."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: voice
          path: output/KO/audio/

  assets:
    needs: [script]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # media 스텝이 7일 중복 감지용 data/media/license_log.csv를 레포에
    # 커밋해야 하므로 이 잡에 한해 write 권한이 필요하다.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra ffmpeg
          fc-cache -fv
          pip install requests Pillow>=10.0.0 pyyaml playwright imagehash
          playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      - name: 🖼️ media_map.json 생성 (연합뉴스/KBS 이미지 검색)
        env:
          YONHAP_API_KEY: ${{ secrets.YONHAP_API_KEY }}
          KBS_API_KEY: ${{ secrets.KBS_API_KEY }}
          NAVER_SEARCH_CLIENT_ID: ${{ secrets.NAVER_SEARCH_CLIENT_ID }}
          NAVER_SEARCH_CLIENT_SECRET: ${{ secrets.NAVER_SEARCH_CLIENT_SECRET }}
          ENABLE_NAVER_DISCOVERY: ${{ secrets.NAVER_SEARCH_CLIENT_ID && 'true' || 'false' }}
          MEDIA_MOCK: ${{ inputs.dry_run && '1' || '' }}
        run: python pipeline/generate_media.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: media
          path: output/KO/media/
      - run: python pipeline/generate_assets.py KO
      - uses: actions/upload-artifact@v4
        with:
          name: assets
          path: output/KO/frames/
      - name: 📇 license_log.csv 커밋 (7일 중복 감지 유지용)
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -n "$(git status --porcelain data/media/license_log.csv 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/media/license_log.csv
            git commit -m "chore: license_log.csv 업데이트 ($(TZ='Asia/Seoul' date +'%Y-%m-%d'))"
            git pull --rebase
            git push
          else
            echo "license_log.csv 변경 없음 → 커밋 생략"
          fi

  video:
    needs: [script, voice, assets]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra ffmpeg libass-dev libass9
          fc-cache -fv
          # generate_metadata.py의 build_thumbnail()이 assets/builders.py →
          # assets/render.py를 import하는데, 거기서 playwright(Chromium
          # 스크린샷 렌더러)가 필요하다(설치 목록에서 빠져 있어
          # "ModuleNotFoundError: playwright"로 실패하던 버그).
          pip install requests Pillow>=10.0.0 pyyaml playwright
          playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: script
          path: output/KO/scripts/
      - uses: actions/download-artifact@v4
        with:
          name: voice
          path: output/KO/audio/
      - uses: actions/download-artifact@v4
        with:
          name: assets
          path: output/KO/frames/
      - uses: actions/download-artifact@v4
        with:
          name: media
          path: output/KO/media/
      - name: asset_map.json 생성
        run: |
          python - <<'PY'
          import glob, json, os
          frames = sorted(glob.glob('output/KO/frames/*.png'))
          os.makedirs('output/KO', exist_ok=True)
          json.dump({'frames': frames, 'lang': 'KO'}, open('output/KO/asset_map.json','w',encoding='utf-8'), ensure_ascii=False, indent=2)
          PY
      - run: python pipeline/generate_subtitles.py KO
      - name: 🎬 영상 합성 (45~60초 고정)
        env:
          TARGET_MIN_SECONDS: "45"
          TARGET_MAX_SECONDS: "60"
        run: python pipeline/generate_video.py KO
      - name: 📋 YouTube 메타데이터 생성 (제목/설명/태그/썸네일)
        run: python pipeline/generate_metadata.py KO
      - name: ✅ 결과물 검증 (영상 길이 + metadata.json)
        env:
          TARGET_MIN_SECONDS: "45"
          TARGET_MAX_SECONDS: "60"
        run: python pipeline/quality_gate.py KO
      - name: 📦 배포 산출물 업로드 준비
        run: |
          DATE_DIR=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          echo "DATE_DIR=${DATE_DIR}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.dry_run && format('dryrun-{0}', env.DATE_DIR) || format('shorts-{0}', env.DATE_DIR) }}
          path: output/${{ env.DATE_DIR }}/
          retention-days: 30
