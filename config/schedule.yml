# config/schedule.yml
# 이 레포의 실행 창(window)/목표 길이를 정의한다.
# pipeline/config_schedule.py가 이 파일을 로드해 상수로 노출한다.

briefing_type: shorts

window:
  start: "07:00"   # STEP-1(morning_core) 데이터 준비 직후 — 본편보다 먼저
                    # 발행해 유입 훅으로 쓰는 걸 권장(README 참고)
  end:   "08:00"

duration:
  min_seconds: 45
  max_seconds: 60
